<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Ví VNM</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="app.js"></script>
</head>
<body>
    <div class="appManager" x-data="appManager">

        <div class="container">
            <p x-show="isLoading" style="text-align: center;">Đang tải...</p>
            <div class="page-content" :key="currentView" x-show="!isLoading" x-html="pageContent" x-effect="$nextTick(() => Alpine.initTree($root))"></div>
        </div>
    </div>

    <nav class="toolbar">
        <a href="#" @click.prevent="loadView('home')" class="toolbar-item" :class="{ 'active': currentView === 'home' }">
            <i class="fas fa-wallet"></i>
            <span>Ví</span>
        </a>
        <a href="#" @click.prevent="loadView('history')" class="toolbar-item" :class="{ 'active': currentView === 'history' }">
            <i class="fas fa-history"></i>
            <span>Lịch sử</span>
        </a>
        <a href="#" @click.prevent="loadView('settings')" class="toolbar-item" :class="{ 'active': currentView === 'settings' }">
            <i class="fas fa-cog"></i>
            <span>Cài đặt</span>
        </a>
    </nav>
</body>
</html>
