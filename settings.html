<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cài đặt</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Cài đặt</h1>
        </div>
        
        <div class="settings-menu">
            <div class="setting-item">
                <div><i class="fas fa-user-circle"></i> Hồ sơ</div>
                <i class="fas fa-chevron-right"></i>
            </div>
            <div class="setting-item">
                <div><i class="fas fa-shield-alt"></i> Bảo mật</div>
                <i class="fas fa-chevron-right"></i>
            </div>
            <div class="setting-item">
                <div><i class="fas fa-key"></i> Cụm từ khôi phục ví</div>
                <i class="fas fa-chevron-right"></i>
            </div>
            <div class="setting-item">
                <div><i class="fas fa-bell"></i> Thông báo</div>
                <i class="fas fa-chevron-right"></i>
            </div>
            <div class="setting-item">
                <div><i class="fas fa-globe"></i> Ngôn ngữ</div>
                <i class="fas fa-chevron-right"></i>
            </div>
            <div class="setting-item">
                <div><i class="fas fa-question-circle"></i> Hỗ trợ</div>
                <i class="fas fa-chevron-right"></i>
            </div>
             <div class="setting-item" style="color: var(--danger-color);">
                <div><i class="fas fa-sign-out-alt"></i> Đăng xuất</div>
            </div>
        </div>
    </div>

    <nav class="toolbar">
        <a href="index.html" class="toolbar-item">
            <i class="fas fa-wallet"></i>
            <span>Ví</span>
        </a>
        <a href="history.html" class="toolbar-item">
            <i class="fas fa-history"></i>
            <span>Lịch sử</span>
        </a>
        <a href="settings.html" class="toolbar-item active">
            <i class="fas fa-cog"></i>
            <span>Cài đặt</span>
        </a>
    </nav>
</body>
</html>
