<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhận VNM</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container centered">
        <div class="header">
            <h1>Nhận VNM</h1>
        </div>
        
        <p>Sử dụng địa chỉ dưới đây để nhận VNM</p>
        
        <div class="qr-code-container">
            <img src="images/qrcode.png" alt="QR Code">
        </div>

        <div class="info-box">
            <p class="label">Địa chỉ ví VNM của bạn</p>
            <p class="value" id="vnm-address">UQDO...CYCV <button onclick="copyAddress()" class="icon-button"><i class="fas fa-copy"></i></button></p>
        </div>
        
        <div class="transactions">
            <h2>Lịch sử nhận gần đây</h2>
            <div class="transaction-item">
                <div class="transaction-details">
                    <p class="type">Nhận từ UAQW...FGHJ</p>
                    <p class="date">15/09/2025 10:30</p>
                </div>
                <p class="transaction-amount amount-received">+ 500 VNM</p>
            </div>
             </div>
    </div>
    
    <nav class="toolbar">
        <a href="index.html" class="toolbar-item">
            <i class="fas fa-wallet"></i>
            <span>Ví</span>
        </a>
        <a href="history.html" class="toolbar-item">
            <i class="fas fa-history"></i>
            <span>Lịch sử</span>
        </a>
        <a href="settings.html" class="toolbar-item">
            <i class="fas fa-cog"></i>
            <span>Cài đặt</span>
        </a>
    </nav>

    <script>
        function copyAddress() {
            const address = document.getElementById('vnm-address').innerText;
            navigator.clipboard.writeText(address).then(() => {
                alert('Đã sao chép địa chỉ ví!');
            });
        }
    </script>
</body>
</html>
